<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IPB Makan</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

/* ===== GLOBAL ===== */
body {
  font-family: 'Inter', sans-serif;
  background: #0f172a;
  color: white;
  overflow-x: hidden;
}

/* ===== NAVBAR GLASS ===== */
.navbar {
  backdrop-filter: blur(14px);
  background: rgba(255,255,255,0.08);
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

/* ===== FLOATING FOOD BACKGROUND ===== */
.floating {
  position: fixed;
  z-index: 0;
  pointer-events: none;
}

.floating img {
  width: 120px;
  opacity: 0.15;
  animation: float 10s infinite ease-in-out;
}

@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-40px); }
  100% { transform: translateY(0px); }
}

/* ===== PARALLAX EFFECT ===== */
.parallax {
  transform: translateY(var(--scroll));
}

/* ===== HERO ===== */
.hero {
  position: relative;
  z-index: 2;
}

/* ===== CARD ===== */
.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 16px;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.03);
  background: rgba(255,255,255,0.1);
}

/* ===== BUTTON ===== */
.btn {
  background: linear-gradient(135deg, #ff4d4d, #ff7a18);
  padding: 10px 16px;
  border-radius: 12px;
  font-weight: bold;
}

/* ===== SCROLL AREA ===== */
.scroll-x {
  display: flex;
  gap: 20px;
  overflow-x: auto;
}

/* ===== HIDE SCROLLBAR ===== */
.scroll-x::-webkit-scrollbar {
  display: none;
}

</style>
</head>

<body>

<!-- FLOATING FOOD -->
<div class="floating" style="top:10%; left:5%">
  <img src="https://cdn-icons-png.flaticon.com/512/1046/1046784.png">
</div>

<div class="floating" style="top:60%; left:80%">
  <img src="https://cdn-icons-png.flaticon.com/512/5787/5787016.png">
</div>

<div class="floating" style="top:30%; left:70%">
  <img src="https://cdn-icons-png.flaticon.com/512/135/135620.png">
</div>

<!-- NAVBAR -->
<div class="navbar flex justify-between items-center px-8 py-4 fixed w-full z-10">

  <div class="flex items-center gap-3">
    <img src="assets/logo.png" class="w-10">
    <h1 class="font-bold text-lg">IPB Makan</h1>
  </div>

  <div class="flex gap-3">
    <a href="login.html" class="px-4 py-2 border rounded-lg">Sign-in</a>
    <a href="register.html" class="btn">Log-in</a>
  </div>

</div>

<!-- HERO -->
<div class="hero pt-28 px-8">

  <h1 class="text-5xl font-extrabold leading-tight mb-6">
    Mau Jajan Apa <br> Hari Ini Bess??
  </h1>

  <!-- CARD GRID -->
  <div class="grid grid-cols-3 gap-6">

    <!-- BIG -->
    <div class="col-span-2 card flex justify-between items-center">
      <div>
        <p class="opacity-70">Fast Food</p>
        <h2 class="text-3xl font-bold mt-2">Fresh, Bold & Tasty</h2>
        <button class="btn mt-4">Explore</button>
      </div>
      <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd" class="w-40 rounded-xl">
    </div>

    <!-- SIDE -->
    <div class="flex flex-col gap-6">
      <div class="card">🍔 Burger Hits</div>
      <div class="card">🧀 Cheese Melt</div>
    </div>

  </div>

</div>

<!-- REKOMENDASI -->
<div class="px-8 mt-16">

  <h2 class="text-2xl font-bold mb-6">Butuh Referensi?</h2>

  <div class="grid grid-cols-4 gap-6">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092" class="rounded-xl mb-2">
      <h3 class="font-bold">Ayam Geprek</h3>
      <p class="opacity-70 text-sm">Rp 10.000</p>
      <button class="btn mt-3 w-full">Order</button>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1550547660-d9450f859349" class="rounded-xl mb-2">
      <h3 class="font-bold">Burger</h3>
      <p class="opacity-70 text-sm">Rp 15.000</p>
      <button class="btn mt-3 w-full">Order</button>
    </div>

  </div>

</div>

<!-- TIKTOK -->
<div class="px-8 mt-20 mb-20">

  <h2 class="text-2xl font-bold mb-6">Video Makan IPB</h2>

  <div class="scroll-x">

    <blockquote class="tiktok-embed"
      cite="https://www.tiktok.com/@ipbmakan"
      data-unique-id="ipbmakan"
      data-embed-type="creator"
      style="max-width: 250px;">
    </blockquote>

    <blockquote class="tiktok-embed"
      cite="https://www.tiktok.com/@ipbmakan"
      data-unique-id="ipbmakan"
      data-embed-type="creator"
      style="max-width: 250px;">
    </blockquote>

  </div>

</div>

<script async src="https://www.tiktok.com/embed.js"></script>

<!-- PARALLAX SCRIPT -->
<script>
window.addEventListener("scroll", () => {
  const scroll = window.scrollY;
  document.documentElement.style.setProperty('--scroll', scroll * 0.2 + "px");
});
</script>

</body>
</html>
